<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Děkuji za pozornost</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        /* Ambient glows */
        .glow-1 {
            position: absolute;
            width: 600px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            filter: blur(80px);
            pointer-events: none;
        }
        
        .glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(176, 38, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -100px;
            filter: blur(80px);
            pointer-events: none;
        }
        
        /* Main content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding-top: 60px;
            padding-left: 60px;
            padding-right: 60px;
        }
        
        .thanks-text {
            font-size: 56px;
            font-weight: 800;
            color: #e0e0e0;
            margin-bottom: 24px;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        
        .thanks-highlight {
            background: linear-gradient(135deg, #00d9ff 0%, #b026ff 50%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .thanks-subtitle {
            font-size: 18px;
            color: #b0b0b0;
            margin-bottom: 48px;
            font-weight: 400;
            line-height: 1.6;
        }
        
        /* Contact section */
        .contact-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 48px;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        
        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid;
            min-width: 40px;
        }
        
        .contact-1 .contact-icon {
            background: rgba(0, 217, 255, 0.1);
            border-color: rgba(0, 217, 255, 0.4);
        }
        
        .contact-2 .contact-icon {
            background: rgba(0, 255, 65, 0.1);
            border-color: rgba(0, 255, 65, 0.4);
        }
        
        .contact-3 .contact-icon {
            background: rgba(176, 38, 255, 0.1);
            border-color: rgba(176, 38, 255, 0.4);
        }
        
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        
        .contact-label {
            font-size: 11px;
            color: #909090;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .contact-value {
            font-size: 14px;
            color: #e0e0e0;
            font-weight: 600;
            font-family: 'Inter', monospace;
        }
        
        .contact-1 .contact-value {
            color: #00d9ff;
        }
        
        .contact-2 .contact-value {
            color: #00ff41;
        }
        
        .contact-3 .contact-value {
            color: #b026ff;
        }
        
        /* CTA button */
        .cta-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        
        .cta-button {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(135deg, #00d9ff 0%, #b026ff 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.4);
        }
        
        .cta-subtext {
            font-size: 12px;
            color: #909090;
            font-weight: 500;
        }
        
        /* Decorative elements */
        .accent-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0.2;
        }
        
        .dot-1 {
            top: 100px;
            left: 80px;
            background: #00d9ff;
        }
        
        .dot-2 {
            top: 150px;
            right: 100px;
            background: #b026ff;
        }
        
        .dot-3 {
            bottom: 120px;
            left: 120px;
            background: #ff006e;
        }
        
        .dot-4 {
            bottom: 100px;
            right: 80px;
            background: #00ff41;
        }
        
        /* Bottom accent line */
        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d9ff, #b026ff, #ff006e, #00ff41);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Ambient glows -->
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        
        <!-- Decorative dots -->
        <div class="accent-dots">
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>
            <div class="dot dot-4"></div>
        </div>
        
        <!-- Main content -->
        <div class="content">
            <h1 class="thanks-text">
                Děkuji za
                <br>
                <span class="thanks-highlight">pozornost</span>
            </h1>
            
            <p class="thanks-subtitle">
                Připraveni začít s Agency AI?<br>
                Vaše cesta k automatizaci prodejů začíná zde.
            </p>
            
            <!-- Contact section -->
            <div class="contact-section">
                <div class="contact-item contact-1">
                    <div class="contact-icon">🌐</div>
                    <div class="contact-info">
                        <div class="contact-label">Web</div>
                        <div class="contact-value">ai-business-automation.manus.space</div>
                    </div>
                </div>
                
                <div class="contact-item contact-2">
                    <div class="contact-icon">📧</div>
                    <div class="contact-info">
                        <div class="contact-label">Email</div>
                        <div class="contact-value">support@agencyai.cz</div>
                    </div>
                </div>
                
                <div class="contact-item contact-3">
                    <div class="contact-icon">💬</div>
                    <div class="contact-info">
                        <div class="contact-label">Chat</div>
                        <div class="contact-value">Aria dostupná 24/7</div>
                    </div>
                </div>
            </div>
            
            <!-- CTA section -->
            <div class="cta-section">
                <button class="cta-button">Spustit Agency AI</button>
                <div class="cta-subtext">Zdarma pro první projekt</div>
            </div>
        </div>
        
        <!-- Accent bar -->
        <div class="accent-bar"></div>
    </div>
</body>
</html>
